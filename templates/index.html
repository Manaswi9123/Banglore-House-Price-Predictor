<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>House Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap.min.css">
  </head>
  <body  style="background-color: cadetblue">
    <div class="container">
      <div class="row">
        <div class="card" style="width: 100%; height: 100%; margin-top: 50px; background-color: bisque">
          <div class="card-header" style="text-align: center;color: crimson">
            <h1>Welcome to Banglore House Price Predictor</h1>
          </div>
          <div class="card-body">
            <form action="#" method="post" accept-charset="utf-8">
              <div class="row">
                <div class="col-md-6 form-group" style="text-align: center;color: cornflowerblue">
                  <label for="location"><b>Select Location:</b></label>
                  <select class="selectpicker form-control" name="location" id="location" required>
                    {% for location in locations %}
                    <option value="{{location}}">{{location}}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="col-md-6 form-group" style="text-align: center;color: cornflowerblue">
                  <label for="bhk"><b>Enter BHK:</b></label>
                  <input type="text" class="form-control" placeholder="Enter BHK" name="bhk" id="bhk">
                </div>

                <div class="col-md-6 form-group" style="text-align: center;color: cornflowerblue">
                  <label for="bath"><b>Enter No of Bathrooms:</b></label>
                  <input type="text" class="form-control" placeholder="Enter no of bathrooms" name="bath" id="bath">
                </div>

                <div class="col-md-6 form-group" style="text-align: center;color: cornflowerblue">
                  <label for="total_sft"><b>Enter SquareFeet:</b></label>
                  <input type="text" class="form-control" placeholder="Enter square feet" name="total_sft" id="total_sft">
                </div>

                <div class="col-md-12 form-group" style="margin-top: 20px">
                  <button class="btn btn-dark form-control" onclick="send_data()">
                    Predict Price
                  </button>
                </div>

              </div>
            </form>
            <br>

            <div class="col-md-12" style="text-align: center;color: darkmagenta">
              <h3><span id="prediction"></span> </h3>
            </div>

          </div>
        </div>
      </div>
    </div>


    <script>
      function form_handler(e) {
        e.preventDefault()
      }
      function send_data() {
        document.querySelector('form').addEventListener('submit',form_handler);
        var fd=new FormData(document.querySelector('form'));
        var xhr=new XMLHttpRequest();
        xhr.open('POST','/predict',true);
        document.getElementById('prediction').innerHTML="Wait Predicting price!...";
        xhr.onreadystatechange =function (){
          if (xhr.readyState==XMLHttpRequest.DONE){
            document.getElementById('prediction').innerHTML="Prediction: Rs "+xhr.responseText
          }
        }
        xhr.onload=function(){ };
        xhr.send(fd)
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
